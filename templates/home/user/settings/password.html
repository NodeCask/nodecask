{% extends "../../layout.html" %}
{% block content %}
<div id="Main">
    <div id="Content">
        <div class="box">
            <div class="cell">
                <a href="/">{{ ctx.website.nickname }}</a> <span class="chevron">&nbsp;›&nbsp;</span> <a href="/user/center">{{t!(self.ctx,
                    "user.t.settings_crumb")}}</a>
                &rsaquo; {{t!(self.ctx, "user.t.change_password_crumb")}}
            </div>
            <div class="inner">
                {% if !tips.is_empty() %}
                <div class="problem">{{ tips }}</div>
                {% endif %}
                <form action="/user/settings/password" method="POST" class="form">
                    <div class="form-row">
                        <label for="old_password">{{t!(self.ctx, "user.t.current_password_label")}}</label>
                        <input type="password" id="old_password" name="old_password" required>
                    </div>

                    <div class="form-row">
                        <label for="new_password">{{t!(self.ctx, "user.t.new_password_label")}}</label>
                        <input type="password" id="new_password" name="new_password" required>
                    </div>

                    <div class="form-row">
                        <label for="confirm_password">{{t!(self.ctx, "user.t.confirm_new_password_label")}}</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="super normal button">{{t!(self.ctx,
                            "user.t.change_password_button")}}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="Sidebar">
        {% include "sidebar.html" %}
    </div>
</div>
{% endblock %}
