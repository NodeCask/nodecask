{% extends "../layout.html" %}
{% block content %}
<div id="Main">
    <div id="Content" class="full-width">
        <div class="box">
            <div class="cell" style="text-align: center; padding: 30px">
                <div
                    style="
                        font-size: 72px;
                        font-weight: bold;
                        color: var(--text-primary);
                        margin-bottom: 20px;
                    "
                >
                    404
                </div>
                <div
                    style="
                        font-size: 20px;
                        color: var(--text-primary);
                        margin-bottom: 10px;
                    "
                >
                    页面未找到
                </div>
                <div
                    style="
                        color: var(--text-secondary);
                        margin-bottom: 30px;
                        max-width: 500px;
                        margin-left: auto;
                        margin-right: auto;
                    "
                >
                    抱歉，您访问的页面不存在或已被移除。
                </div>
                <div style="display: flex; gap: 15px; justify-content: center">
                    <a
                        href="/"
                        style="
                            display: inline-block;
                            padding: 10px 20px;
                            background-color: var(--primary);
                            color: white;
                            text-decoration: none;
                            border-radius: var(--radius);
                        "
                    >
                        返回首页
                    </a>
                    <a
                        href="javascript:history.back()"
                        style="
                            display: inline-block;
                            padding: 10px 20px;
                            background-color: var(--bg-card);
                            color: var(--text-primary);
                            text-decoration: none;
                            border: 1px solid var(--divider-color);
                            border-radius: var(--radius);
                        "
                    >
                        返回上一页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
