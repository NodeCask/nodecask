{% extends "../layout.html" %}
{% block content %}
<div id="Main">
    <div id="Content" class="full-width">
        <div class="box">
            <div class="cell" style="text-align: center; padding: 30px">
                <div
                    style="
                        font-size: 72px;
                        font-weight: bold;
                        color: var(--text-primary);
                        margin-bottom: 20px;
                    "
                >
                    500
                </div>
                <div
                    style="
                        font-size: 20px;
                        color: var(--text-primary);
                        margin-bottom: 10px;
                    "
                >
                    服务器内部错误
                </div>
                <div
                    style="
                        color: var(--text-secondary);
                        margin-bottom: 30px;
                        max-width: 500px;
                        margin-left: auto;
                        margin-right: auto;
                    "
                >
                    抱歉，服务器遇到了意外错误，无法完成您的请求。
                </div>
                <div style="display: flex; gap: 15px; justify-content: center">
                    <a
                        href="/"
                        style="
                            display: inline-block;
                            padding: 10px 20px;
                            background-color: var(--primary);
                            color: white;
                            text-decoration: none;
                            border-radius: var(--radius);
                        "
                    >
                        返回首页
                    </a>
                    <a
                        href="javascript:location.reload()"
                        style="
                            display: inline-block;
                            padding: 10px 20px;
                            background-color: var(--bg-card);
                            color: var(--text-primary);
                            text-decoration: none;
                            border: 1px solid var(--divider-color);
                            border-radius: var(--radius);
                        "
                    >
                        刷新页面
                    </a>
                </div>
                <div
                    style="
                        margin-top: 30px;
                        padding-top: 20px;
                        border-top: 1px solid var(--divider-color);
                        color: var(--text-tertiary);
                        font-size: 13px;
                    "
                >
                    如果问题持续存在，请联系管理员。
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
