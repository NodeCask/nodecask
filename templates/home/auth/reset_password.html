{% extends "../layout.html" %} {% block content %}
<div id="Main">
    <div id="Content" class="full-width auth-page">
        <div class="box auth-box">
            <div class="cell" style="text-align: center; font-weight: bold">
                {{t!(self.ctx, "auth.t.set_new_password")}}
            </div>
            <div class="inner">
                <form action="/reset-password" method="POST" class="form">
                    <input type="hidden" name="token" value="{{ token }}" />
                    <input type="hidden" name="email" value="{{ email }}" />
                    <div class="form-row">
                        <label for="password"
                            >{{t!(self.ctx, "auth.t.new_password")}}</label
                        >
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                        />
                    </div>
                    <div class="form-row">
                        <label for="confirm_password"
                            >{{t!(self.ctx,
                            "auth.t.confirm_new_password")}}</label
                        >
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            required
                        />
                    </div>
                    {% if !tips.is_empty() %}
                    <div class="problem">{{ tips }}</div>
                    {% endif %}
                    <div class="form-actions" style="">
                        <button type="submit" class="button primary">
                            {{t!(self.ctx, "auth.t.change_password")}}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
