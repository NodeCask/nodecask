<div id="Content">
   <div class="box">
      <div class="cell" style="text-align: center; font-weight: bold;">
         网站规则
      </div>
      <div class="inner">
         <p>为了维护社区的健康和秩序，请所有用户遵守以下规则：</p>
         <div class="sep10"></div>
         <strong>1. 友善交流</strong>
         <p>尊重他人，禁止任何形式的人身攻击、谩骂或诋毁他人的行为。</p>
         <div class="sep10"></div>
         <strong>2. 禁止违规内容</strong>
         <p>严禁发布色情、暴力、赌博、毒品以及任何违反当地法律法规的内容。</p>
         <div class="sep10"></div>
         <strong>3. 禁止垃圾广告</strong>
         <p>禁止发布任何形式的纯广告、诱导性链接或大量的重复内容。</p>
         <div class="sep10"></div>
         <strong>4. 节点相关性</strong>
         <p>请在正确的节点下发布内容，保持社区内容的条理清晰。</p>
         <div class="sep10"></div>
         <strong>5. 账号责任</strong>
         <p>用户需对自己的账号行为负责。严重违反规则的账号将被限制访问甚至禁封。</p>
      </div>
   </div>
</div>
