      <div class="inner">
         <p>欢迎来到帮助中心。以下是一些常见问题的说明：</p>
         <div class="sep10"></div>
         <strong>1. 如何发表主题？</strong>
         <p>注册并登录后，点击首页或节点页面的“创建新主题”按钮即可。</p>
         <div class="sep10"></div>
         <strong>2. 如何修改个人资料？</strong>
         <p>在登录状态下，点击导航栏顶部的用户名进入个人中心，即可找到设置选项。</p>
         <div class="sep10"></div>
         <strong>3. 什么是节点？</strong>
         <p>节点是主题的分类，您可以根据讨论的内容选择合适的节点进行发布。</p>
         <div class="sep10"></div>
         <strong>4. 忘记密码怎么办？</strong>
         <p>如果您绑定了邮箱，可以通过登录页面的“忘记密码”链接进行重置。</p>
